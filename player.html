<html>
  <head>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="main.ico">
    <script>

      function switchGame() {
        var gameList = document.getElementById("gameList");
        var player = document.getElementById("player");
        var server = document.getElementById("server");
        if (gameList.value == "driveMad") {
          if (server.value == "e7p8") {
            player.setAttribute("src", "https://echo-website-e7p8.onrender.com/projects/drive-mad/index.html");
          } else if (server.value == "e6ux") {
            player.setAttribute("src", "https://echo-website-e6ux.onrender.com/projects/drive-mad/index.html");
          }
        } else if (gameList.value == "dogeMiner") {
          if (server.value == "e7p8") {
            player.setAttribute("src", "https://echo-website-e7p8.onrender.com/projects/DogeMiner/index.html");
          } else if (server.value == "e6ux") {
            player.setAttribute("src", "https://echo-website-e6ux.onrender.com/projects/DogeMiner/index.html");
          }
        } else if (gameList.value == "madalinStunt") {
          if (server.value == "e7p8") {
            player.setAttribute("src", "https://echo-website-e7p8.onrender.com/projects/madalin-stunt-cars-2/index.html");
          } else if (server.value == "e6ux") {
            player.setAttribute("src", "https://echo-website-e6ux.onrender.com/projects/madalin-stunt-cars-2/index.html");
          }
        } else if (gameList.value == "default") {
          player.setAttribute("src", "about:blank");
        }
      }
    </script>
  </head>
  <body>
    <p><strong>Note:</strong> There will be more games soon, for requests, <a href="mailto:2028940@apps.nsd.org?subject=Game Request">email me</a></p>
    <div>
      <select id="gameList" onchange="switchGame()">
        <option value="default">None</option>
        <option value="driveMad">Drive Mad</option>
        <option value="dogeMiner">Doge Miner</option>
        <option value="madalinStunt">Madalin Stunt Cars 2</option>
      </select>
      <select id="server" onchange="changeLink()">
        <option value="e7p8">Server 1 (e7p8)</option>
        <option value="e6ux">Server 2 (e6ux)</option>
      </select>
      <br>
      <iframe id="player" style="width: 100%; height: 100%"></iframe>
    </div>
  </body>
</html>
